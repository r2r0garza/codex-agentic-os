name: Hourly Agentic OS Heartbeat

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Show agent-ready issue queue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --label agent-ready --json number,title,labels \
            --jq '[.[] | select(([.labels[].name] | index("blocked")) | not)]
              | if length == 0 then
                  "No unblocked agent-ready issues found."
                else
                  (["\(length) unblocked agent-ready issue(s):"] + [.[] | "  #\(.number) \(.title)"]) | join("\n")
                end'
